<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filoktitis - Malkafa Interactive</title>
    <style>
        :root { --bg: #0A0414; --gold: #FFD700; --paper: #f4e4bc; --text: #2c1e0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Georgia', serif; overflow-x: hidden; }
        
        /* LANG SELECTOR */
        .lang-panel { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255,215,0,0.2); border: 2px solid var(--gold); color: var(--gold); padding: 10px 15px; border-radius: 50%; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--gold); color: var(--bg); }

        /* STORY CONTAINER */
        #app { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #25104A 0%, #0A0414 100%); }
        .parchment { background: var(--paper); color: var(--text); padding: 30px; width: 85%; max-width: 500px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; min-height: 300px; display: flex; flex-direction: column; justify-content: center; border: 8px double #8b4513; }

        /* BUTTONS & CHOICES */
        .btn-play { background: #8b4513; color: white; border: none; padding: 15px 30px; border-radius: 50%; cursor: pointer; font-size: 24px; align-self: center; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .choice-btn { background: rgba(139, 69, 19, 0.1); border: 1px solid #8b4513; padding: 12px; margin: 8px 0; border-radius: 5px; cursor: pointer; text-align: left; transition: 0.3s; font-weight: bold; }
        .choice-btn:hover { background: #8b4513; color: white; }

        .character-img { font-size: 80px; text-align: center; margin-bottom: 20px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="lang-panel">
        <button class="lang-btn active" id="btn-en" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" id="btn-el" onclick="changeLang('el')">EL</button>
    </div>

    <div id="app">
        <div class="parchment fade-in" id="screen">
            </div>
    </div>

    <script>
        const storyData = {
            en: {
                intro: { char: "👴", text: "Hey children... listen to an old story from the Great War in Troy...", btn: "▶️" },
                q1: { 
                    text: "What oracle do you believe I gave them?",
                    choices: [
                        { t: "You have to sacrifice to a Goddess", correct: false },
                        { t: "Arrows are useless; victory will come with peace", correct: true }
                    ],
                    wrong: "Try again!", right: "Absolutely right! 👍"
                },
                q2: {
                    text: "What did Odysseus say to the crew?",
                    choices: [
                        { t: "To take him to a good doctor in Troy", correct: false },
                        { t: "To leave Philoctetes behind on Lemnos", correct: true }
                    ],
                    wrong: "Try again!", right: "Correct! Onward!"
                }
            },
            el: {
                intro: { char: "👴", text: "Γεια σας παιδιά... ακούστε μια παλιά ιστορία από τον Μεγάλο Πόλεμο στην Τροία...", btn: "▶️" },
                q1: { 
                    text: "Ποιο χρησμό πιστεύετε ότι τους έδωσα;",
                    choices: [
                        { t: "Πρέπει να θυσιάσετε σε μια Θεά", correct: false },
                        { t: "Τα βέλη είναι άχρηστα, η νίκη θα έρθει με ειρήνη", correct: true }
                    ],
                    wrong: "Προσπάθησε ξανά!", right: "Απολύτως σωστό! 👍"
                },
                q2: {
                    text: "Τι είπε ο Οδυσσέας στο πλήρωμα;",
                    choices: [
                        { t: "Να τον πάνε σε έναν καλό γιατρό στην Τροία", correct: false },
                        { t: "Να αφήσουν τον Φιλοκτήτη πίσω στη Λήμνο", correct: true }
                    ],
                    wrong: "Προσπάθησε ξανά!", right: "Σωστά! Συνέχισε!"
                }
            }
        };

        let currentLang = 'en';
        let step = 'intro';

        function changeLang(l) {
            currentLang = l;
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('btn-el').classList.toggle('active', l === 'el');
            render();
        }

        function render() {
            const screen = document.getElementById('screen');
            const data = storyData[currentLang];
            screen.classList.remove('fade-in');
            void screen.offsetWidth; // Trigger reflow
            screen.classList.add('fade-in');

            if (step === 'intro') {
                screen.innerHTML = `
                    <div class="character-img">${data.intro.char}</div>
                    <p style="text-align:center; font-style:italic;">${data.intro.text}</p>
                    <button class="btn-play" onclick="goTo('q1')">${data.intro.btn}</button>
                `;
            } else if (step === 'q1' || step === 'q2') {
                const q = data[step];
                screen.innerHTML = `<h3>${q.text}</h3>` + 
                    q.choices.map((c, i) => `<button class="choice-btn" onclick="check(${c.correct}, '${step}')">${c.t}</button>`).join('');
            }
        }

        function check(isCorrect, currentStep) {
            const data = storyData[currentLang][currentStep];
            if (isCorrect) {
                alert(data.right);
                if (currentStep === 'q1') goTo('q2');
                else { alert("The End / Τέλος"); location.reload(); }
            } else {
                alert(data.wrong);
            }
        }

        function goTo(s) { step = s; render(); }

        render();
    </script>
</body>
</html>
