<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filoktitis - Antikythera Experience</title>
    <style>
        :root { --bg: #0A0414; --panel: #1F0B42; --gold: #FFD700; --text: #FFFFFF; --gray: #A594C1; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* DİL SEÇİCİ */
        .lang-bar { position: fixed; top: 25px; right: 25px; z-index: 999; display: flex; gap: 12px; }
        .lang-btn { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.4s; }
        .lang-btn.active { background: var(--gold); color: var(--bg); box-shadow: 0 0 15px var(--gold); }

        /* GİRİŞ EKRANI */
        #intro { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #25104A 0%, #0A0414 100%); transition: 0.5s; }
        .ship-logo { width: 130px; height: 130px; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 0 40px var(--gold); margin-bottom: 25px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .main-btn { margin-top: 50px; padding: 18px 70px; background: var(--gold); color: var(--bg); border: none; border-radius: 40px; font-weight: 900; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }

        /* HİKAYE AKIŞI */
        #story { display: none; padding: 80px 20px 120px; max-width: 600px; margin: auto; }
        .story-card { background: var(--panel); border-radius: 25px; padding: 30px; margin-bottom: 40px; border: 1px solid rgba(255,215,0,0.2); position: relative; animation: slideUp 0.8s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .card-icon { font-size: 50px; display: block; text-align: center; margin-bottom: 15px; }
        .card-title { color: var(--gold); font-size: 20px; margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 10px; }
        .card-desc { color: var(--gray); line-height: 1.7; font-size: 16px; }

        /* NAVİGASYON */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #16082A; padding: 20px 0; display: none; justify-content: center; border-top: 1px solid var(--gold); z-index: 100; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-el" onclick="setLang('el')">EL</button>
    </div>

    <div id="intro">
        <div class="ship-logo">🚢</div>
        <h1 id="txt-title" style="color: var(--gold); letter-spacing: 5px; margin: 0;">FILOKTITIS</h1>
        <p id="txt-subtitle" style="color: var(--gray); margin-top: 15px;">Discover the Ancient Secrets</p>
        <button class="main-btn" id="txt-start" onclick="showStory()">ENTER</button>
    </div>

    <div id="story">
        <div id="steps-container"></div>
    </div>

    <div class="nav-bar" id="nav">
        <button class="main-btn" id="txt-home" style="margin-top: 0; padding: 12px 50px;" onclick="location.reload()">HOME</button>
    </div>

    <script>
        const content = {
            en: {
                title: "FILOKTITIS", subtitle: "Discover the Ancient Secrets", start: "START JOURNEY", home: "HOME",
                steps: [
                    { t: "The Journey Begins", i: "🌊", d: "Philoctetes and his brave crew set sail from the port of Pergamon, carrying a treasure beyond imagination." },
                    { t: "The Masterpiece", i: "⚙️", d: "In the ship's hold lay the Antikythera Mechanism, a device so complex it could calculate the stars." },
                    { t: "The Abyss", i: "⛈️", d: "A violent storm struck near the coast. The ship broke apart, and the mechanism sank into the dark silence of the sea." },
                    { t: "The Awakening", i: "🔍", d: "2000 years later, sponge divers brought the corroded bronze back to light, revealing an ancient digital world." }
                ]
            },
            el: {
                title: "ΦΙΛΟΚΤΗΤΗΣ", subtitle: "Ανακαλύψτε τα Αρχαία Μυστικά", start: "ΕΙΣΟΔΟΣ", home: "ΑΡΧΙΚΗ",
                steps: [
                    { t: "Το Ταξίδι Ξεκινά", i: "🌊", d: "Ο Φιλοκτήτης και το γενναίο πλήρωμά του σάλπαραν από το λιμάνι της Περγάμου, μεταφέροντας έναν αμύθητο θησαυρό." },
                    { t: "Το Αριστούργημα", i: "⚙️", d: "Στο κύτος του πλοίου βρισκόταν ο Μηχανισμός των Αντικυθήρων, μια συσκευή που υπολόγιζε τα άστρα." },
                    { t: "Η Άβυσσος", i: "⛈️", d: "Μια βίαιη καταιγίδα ξέσπασε κοντά στην ακτή. Το πλοίο διαλύθηκε και ο μηχανισμός βυθίστηκε στη σιωπή της θάλασσας." },
                    { t: "Η Αφύπνιση", i: "🔍", d: "2000 χρόνια αργότερα, σφουγγαράδες έφεραν το διαβρωμένο μπρούντζο ξανά στο φως, αποκαλύπτοντας έναν αρχαίο κόσμο." }
                ]
            }
        };

        let lang = 'en';

        function setLang(l) {
            lang = l;
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('btn-el').classList.toggle('active', l === 'el');
            updateUI();
        }

        function updateUI() {
            const d = content[lang];
            document.getElementById('txt-title').innerText = d.title;
            document.getElementById('txt-subtitle').innerText = d.subtitle;
            document.getElementById('txt-start').innerText = d.start;
            document.getElementById('txt-home').innerText = d.home;
            
            const cont = document.getElementById('steps-container');
            cont.innerHTML = '';
            d.steps.forEach(s => {
                cont.innerHTML += `
                    <div class="story-card">
                        <span class="card-icon">${s.i}</span>
                        <h3 class="card-title">${s.t}</h3>
                        <p class="card-desc">${s.d}</p>
                    </div>
                `;
            });
        }

        function showStory() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('story').style.display = 'block';
            document.getElementById('nav').style.display = 'flex';
            window.scrollTo(0,0);
        }

        updateUI();
    </script>
</body>
</html>
