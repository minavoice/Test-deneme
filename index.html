<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Archaeological Museum - 15 Level Special Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;900&display=swap');
        
        :root { --gold: #D4AF37; --dark: #0A0A0A; --kids-blue: #1E88E5; }
        body, html { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; height: 100%; background: #000; color: #fff; overflow-x: hidden; }

        /* LANGUAGE SELECTOR */
        .lang-bar { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .l-btn { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; cursor: pointer; font-family: 'Cinzel'; margin-left: 5px; border-radius: 5px; font-weight: bold; }
        .l-btn.active { background: var(--gold); color: #000; }

        /* MAIN MENU */
        #main-menu { height: 100vh; display: flex; flex-direction: column; }
        .mode-card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; text-align: center; }
        .expert-card { background: #fff; color: #000; border-bottom: 2px solid var(--gold); }
        .kids-card { background: #FFD54F; color: #4527A0; }
        .mode-card h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; margin: 10px 0; }

        /* EXPERT VIEW & SCANNER */
        #expert-view { display: none; min-height: 100vh; background: #F5F5F5; color: #212121; }
        .artifact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; padding-bottom: 80px; }
        .artifact-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 4px solid var(--gold); }
        .artifact-card img { width: 100%; height: 150px; object-fit: cover; }
        .artifact-card p { padding: 12px; font-weight: 900; text-align: center; font-size: 0.8rem; }

        #scanner { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .scan-frame { width: 260px; height: 260px; border: 2px solid var(--gold); position: relative; overflow: hidden; }
        .scan-line { width: 100%; height: 3px; background: #00FF00; position: absolute; animation: scanAnim 2s infinite linear; box-shadow: 0 0 15px #00FF00; }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }
        .res-box { background: #fff; color: #000; padding: 25px; border-radius: 10px; width: 100%; max-width: 450px; margin-top: 20px; text-align: center; }

        /* KIDS GAME VIEW (15 LEVELS) */
        #kids-view { display: none; min-height: 100vh; background: #E3F2FD; color: #1565C0; text-align: center; }
        .kids-header { background: var(--kids-blue); color: #fff; padding: 20px; font-size: 1.5rem; font-weight: 900; border-bottom: 6px solid #0D47A1; }
        .quiz-card { background: #fff; margin: 20px; padding: 30px; border-radius: 35px; border: 8px solid var(--kids-blue); }
        .opt-btn { display: block; width: 100%; padding: 16px; margin: 10px 0; border-radius: 50px; border: 3px solid var(--kids-blue); background: #fff; font-weight: 900; cursor: pointer; color: var(--kids-blue); font-size: 1rem; }
        .shelf { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; }
        .slot { width: 45px; height: 45px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; opacity: 0.2; border: 2px dashed #90CAF9; }
        .slot.found { opacity: 1; border-style: solid; background: #FFF176; transform: scale(1.1); }

        .btn-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 35px; border-radius: 30px; border: 2px solid var(--gold); cursor: pointer; font-family: 'Cinzel'; z-index: 500; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="l-btn active" id="en-toggle" onclick="setLang('en')">EN</button>
        <button class="l-btn" id="el-toggle" onclick="setLang('el')">EL</button>
    </div>

    <div id="main-menu">
        <div class="mode-card expert-card" onclick="openMode('expert')">
            <h1 data-key="m-expert-h">EXHIBITION GUIDE</h1>
            <p data-key="m-expert-p">Scan & Discover Ancient Secrets</p>
        </div>
        <div class="mode-card kids-card" onclick="openMode('kids')">
            <h1 data-key="m-kids-h">I'M THE ARCHAEOLOGIST!</h1>
            <p data-key="m-kids-p">15 Missions of Ancient Greece 🏺</p>
        </div>
    </div>

    <div id="expert-view">
        <div style="padding:20px; font-family:'Cinzel'; text-align:center; font-size:1.2rem; background:#fff; border-bottom:3px solid #000;" data-key="exp-title">ARTIFACT EXPLORER</div>
        <div class="artifact-grid" id="grid"></div>
        <div id="scanner">
            <div class="scan-frame"><div class="scan-line"></div></div>
            <div class="res-box" id="res-content"></div>
            <button onclick="closeScanner()" style="margin-top:20px; padding:10px 40px; cursor:pointer; font-weight:bold;" data-key="close">CLOSE</button>
        </div>
    </div>

    <div id="kids-view">
        <div class="kids-header"><span data-key="lvl">MISSION</span>: <span id="lvl-txt">1</span> / 15</div>
        <div class="quiz-card">
            <h3 id="q-txt">Question?</h3>
            <div id="q-opts"></div>
        </div>
        <div class="shelf" id="shelf-grid"></div>
    </div>

    <button class="btn-home" id="home-btn" style="display:none;" onclick="location.reload()" data-key="home">MAIN MENU</button>

    <script>
        const i18n = {
            en: {
                "m-expert-h": "EXHIBITION GUIDE", "m-expert-p": "Scan & Discover Ancient Secrets",
                "m-kids-h": "I'M THE ARCHAEOLOGIST!", "m-kids-p": "15 Missions of Ancient Greece 🏺",
                "exp-title": "NATIONAL MUSEUM GUIDE", "close": "CLOSE", "home": "BACK TO MENU",
                "lvl": "MISSION", "scanning": "SCANNING DATA...",
                "correct": "🌟 BRAVO! You solved the mystery! Moving to Mission ",
                "wrong": "❌ Not quite! Try again, young explorer!",
                "win": "🏆 TRIUMPH! You are now a MASTER ARCHAEOLOGIST of Greece!"
            },
            el: {
                "m-expert-h": "ΟΔΗΓΟΣ ΕΚΘΕΣΗΣ", "m-expert-p": "Σάρωση & Ανακάλυψη Μυστικών",
                "m-kids-h": "ΕΙΜΑΙ ΑΡΧΑΙΟΛΟΓΟΣ!", "m-kids-p": "15 Αποστολές της Αρχαίας Ελλάδας 🏺",
                "exp-title": "ΕΘΝΙΚΟ ΑΡΧΑΙΟΛΟΓΙΚΟ ΜΟΥΣΕΙΟ", "close": "ΚΛΕΙΣΙΜΟ", "home": "ΑΡΧΙΚΟ ΜΕΝΟΥ",
                "lvl": "ΑΠΟΣΤΟΛΗ", "scanning": "ΣΑΡΩΣΗ ΔΕΔΟΜΕΝΩΝ...",
                "correct": "🌟 ΜΠΡΑΒΟ! Έλυσες το μυστήριο! Προχωράμε στην Αποστολή ",
                "wrong": "❌ Όχι ακριβώς! Δοκίμασε ξανά, νεαρέ εξερευνητή!",
                "win": "🏆 ΘΡΙΑΜΒΟΣ! Είστε πλέον ΑΡΧΙ-ΑΡΧΑΙΟΛΟΓΟΣ της Ελλάδας!"
            }
        };

        const artifacts = [
            { id: 1, en: "Antikythera Mechanism", el: "Μηχανισμός Αντικυθήρων", img: "https://images.unsplash.com/photo-1628522300055-66774e1d522f?w=400", desc_en: "World's first computer, used for astronomy.", desc_el: "Ο πρώτος υπολογιστής του κόσμου για την αστρονομία." },
            { id: 2, en: "Mask of Agamemnon", el: "Μάσκα του Αγαμέμνονα", img: "https://images.unsplash.com/photo-1572522784534-738914041a95?w=400", desc_en: "Gold funeral mask from Mycenae.", desc_el: "Χρυσή νεκρική μάσκα από τις Μυκήνες." },
            { id: 3, en: "Artemision Zeus", el: "Δίας του Αρτεμισίου", img: "https://images.unsplash.com/photo-1603511813133-7cc3828784d7?w=400", desc_en: "Majestic bronze statue found in a shipwreck.", desc_el: "Μεγαλοπρεπές χάλκινο άγαλμα από ναυάγιο." },
            { id: 4, en: "Artemision Jockey", el: "Ο αναβάτης του Αρτεμισίου", img: "https://images.unsplash.com/photo-1549465220-1d8c9d9c6703?w=400", desc_en: "Dynamic bronze sculpture of a racing horse.", desc_el: "Δυναμικό χάλκινο γλυπτό αλόγου κούρσας." },
            { id: 5, en: "The Diadumenos", el: "Ο Διαδούμενος", img: "https://images.unsplash.com/photo-1560114928-40f1f1eb26a0?w=400", desc_en: "An athlete tying his victory ribbon.", desc_el: "Αθλητής που δένει την ταινία της νίκης." },
            { id: 6, en: "Sphinx of Naxos", el: "Σφίγγα των Ναξίων", img: "https://images.unsplash.com/photo-1599113744215-095568160408?w=400", desc_en: "Guardian creature from Apollo's sanctuary.", desc_el: "Πλάσμα φύλακας από το ιερό του Απόλλωνα." },
            { id: 7, en: "Marathon Boy", el: "Έφηβος του Μαραθώνα", img: "https://images.unsplash.com/photo-1580130281216-1f14f10358d2?w=400", desc_en: "Classical youth statue found in the sea.", desc_el: "Κλασικό άγαλμα εφήβου που βρέθηκε στη θάλασσα." },
            { id: 8, en: "Boxer at Rest", el: "Πυγμάχος σε Ανάπαυση", img: "https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=400", desc_en: "Realistic bronze of a tired athlete.", desc_el: "Ρεαλιστικό χάλκινο άγαλμα κουρασμένου αθλητή." },
            { id: 9, en: "Vaphio Gold Cup", el: "Κύπελλο του Βαφειού", img: "https://images.unsplash.com/photo-1614701838028-d1ba1f1b272f?w=400", desc_en: "Masterpiece of Minoan gold art.", desc_el: "Αριστούργημα μινωικής χρυσοχοΐας." },
            { id: 10, en: "Bronze Poseidon", el: "Χάλκινος Ποσειδώνας", img: "https://images.unsplash.com/photo-1589412227329-58d1018dc470?w=400", desc_en: "The ruler of the deep blue sea.", desc_el: "Ο κυρίαρχος της καταγάλανης θάλασσας." }
        ];

        const questions = [
            { en: "Who is the King of the Greek Gods?", el: "Ποιος είναι ο βασιλιάς των θεών;", opts_en: ["Zeus", "Hades", "Ares"], opts_el: ["Δίας", "Άδης", "Άρης"], c: 0, s: "⚡" },
            { en: "Which city is famous for its 300 warriors?", el: "Ποια πόλη είναι διάσημη για τους 300 πολεμιστές της;", opts_en: ["Athens", "Sparta", "Thebes"], opts_el: ["Αθήνα", "Σπάρτη", "Θήβα"], c: 1, s: "🛡️" },
            { en: "Who wrote the Iliad and Odyssey?", el: "Ποιος έγραψε την Ιλιάδα και την Οδύσσεια;", opts_en: ["Plato", "Homer", "Socrates"], opts_el: ["Πλάτων", "Όμηρος", "Σωκράτης"], c: 1, s: "📜" },
            { en: "Which Goddess is the protector of Athens?", el: "Ποια θεά είναι η προστάτιδα της Αθήνας;", opts_en: ["Hera", "Aphrodite", "Athena"], opts_el: ["Ήρα", "Αφροδίτη", "Αθηνά"], c: 2, s: "🦉" },
            { en: "What did the Greeks build to enter Troy?", el: "Τι έχτισαν οι Έλληνες για να μπουν στην Τροία;", opts_en: ["A Wall", "A Wooden Horse", "A Giant Ship"], opts_el: ["Ένα τείχος", "Έναν Δούρειο Ίππο", "Ένα γιγάντιο πλοίο"], c: 1, s: "🐎" },
            { en: "Where did the Gods live?", el: "Πού ζούσαν οι Θεοί;", opts_en: ["Mt. Olympus", "Mt. Parnassus", "Mt. Ida"], opts_el: ["Όλυμπος", "Παρνασσός", "Ίδη"], c: 0, s: "🏔️" },
            { en: "Who was the Goddess of Love?", el: "Ποια ήταν η θεά του έρωτα;", opts_en: ["Artemis", "Aphrodite", "Demeter"], opts_el: ["Άρτεμις", "Αφροδίτη", "Δήμητρα"], c: 1, s: "❤️" },
            { en: "Who was the hero that killed Medusa?", el: "Ποιος ήρωας σκότωσε τη Μέδουσα;", opts_en: ["Perseus", "Achilles", "Jason"], opts_el: ["Περσέας", "Αχιλλέας", "Ιάσονας"], c: 0, s: "⚔️" },
            { en: "What was the prize in ancient Olympics?", el: "Τι ήταν το βραβείο στους αρχαίους Ολυμπιακούς;", opts_en: ["Gold Medal", "Olive Wreath", "Silver Coin"], opts_el: ["Χρυσό μετάλλιο", "Κότινος", "Ασημένιο νόμισμα"], c: 1, s: "🌿" },
            { en: "Who was the teacher of Alexander the Great?", el: "Ποιος ήταν ο δάσκαλος του Μεγάλου Αλεξάνδρου;", opts_en: ["Aristotle", "Socrates", "Pythagoras"], opts_el: ["Αριστοτέλης", "Σωκράτης", "Πυθαγόρας"], c: 0, s: "🎓" },
            { en: "Which monster has snakes for hair?", el: "Ποιο τέρας έχει φίδια για μαλλιά;", opts_en: ["Hydra", "Medusa", "Minotaur"], opts_el: ["Ύδρα", "Μέδουσα", "Μινώταυρος"], c: 1, s: "🐍" },
            { en: "The Parthenon is located on top of the...", el: "Ο Παρθενώνας βρίσκεται στην κορυφή της...", opts_en: ["Agora", "Acropolis", "Stoa"], opts_el: ["Αγορά", "Ακρόπολη", "Στοά"], c: 1, s: "🏛️" },
            { en: "Who was the God of the Sea?", el: "Ποιος ήταν ο Θεός της Θάλασσας;", opts_en: ["Poseidon", "Apollo", "Hermes"], opts_el: ["Ποσειδώνας", "Απόλλων", "Ερμής"], c: 0, s: "🔱" },
            { en: "What is the Labyrinth? A giant...", el: "Τι είναι ο Λαβύρινθος; Ένας γιγάντιος...", opts_en: ["Garden", "Maze", "Temple"], opts_el: ["Κήπος", "Λαβύρινθος/Μαζέ", "Ναός"], c: 1, s: "🌀" },
            { en: "Who is the Messenger of the Gods?", el: "Ποιος είναι ο αγγελιοφόρος των Θεών;", opts_en: ["Hermes", "Hephaestus", "Dionysus"], opts_el: ["Ερμής", "Ήφαιστος", "Διόνυσος"], c: 0, s: "👟" }
        ];

        let lang = 'en';
        let level = 0;

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(l + '-toggle').classList.add('active');
            Object.keys(i18n[l]).forEach(key => {
                const el = document.querySelector(`[data-key="${key}"]`);
                if(el) el.innerText = i18n[l][key];
            });
            if(document.getElementById('expert-view').style.display === 'block') loadGrid();
            if(document.getElementById('kids-view').style.display === 'block') loadGame();
        }

        function openMode(m) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            document.getElementById(m + '-view').style.display = 'block';
            if(m === 'expert') loadGrid();
            if(m === 'kids') loadGame();
        }

        function loadGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = artifacts.map(a => `
                <div class="artifact-card" onclick="scanItem(${a.id})">
                    <img src="${a.img}">
                    <p>${lang === 'en' ? a.en : a.el}</p>
                </div>
            `).join('');
        }

        function scanItem(id) {
            const a = artifacts.find(x => x.id === id);
            const s = document.getElementById('scanner');
            s.style.display = 'flex';
            document.getElementById('res-content').innerHTML = `<h3>${i18n[lang]['scanning']}</h3>`;
            setTimeout(() => {
                document.getElementById('res-content').innerHTML = `
                    <h2 style="color:var(--gold); font-family: 'Cinzel';">${lang === 'en' ? a.en : a.el}</h2>
                    <p>${lang === 'en' ? a.desc_en : a.desc_el}</p>
                    <button style="width:100%; padding:12px; background:#000; color:#fff; border:none; font-weight:bold;">AUDIO GUIDE</button>
                `;
            }, 1800);
        }

        function closeScanner() { document.getElementById('scanner').style.display = 'none'; }

        function loadGame() {
            if(level >= 15) { alert(i18n[lang].win); location.reload(); return; }
            const q = questions[level];
            document.getElementById('lvl-txt').innerText = level + 1;
            document.getElementById('q-txt').innerText = lang === 'en' ? q.en : q.el;
            document.getElementById('q-opts').innerHTML = (lang === 'en' ? q.opts_en : q.opts_el).map((o, i) => `
                <button class="opt-btn" onclick="answer(${i})">${o}</button>
            `).join('');
            updateShelf();
        }

        function answer(i) {
            if(i === questions[level].c) { 
                alert(i18n[lang].correct + (level + 2) + "!"); 
                level++; 
                loadGame(); 
            }
            else alert(i18n[lang].wrong);
        }

        function updateShelf() {
            document.getElementById('shelf-grid').innerHTML = questions.map((q, i) => `
                <div class="slot ${i < level ? 'found' : ''}">${q.s}</div>
            `).join('');
        }

        setLang('en');
    </script>
</body>
</html>
