<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malkafa - Antik Müze Deneyimi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fredoka:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        :root { 
            --gold: #D4AF37;
            --dark-gold: #8B6508;
            --marble: #E0E0E0;
            --athens-blue: #003366;
            --deep-black: #050505;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: var(--deep-black); color: #fff; overflow-x: hidden; }

        /* --- ÜST KONTROL PANELİ --- */
        .top-nav { position: fixed; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; }
        .nav-btn { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; border-radius: 3px; transition: 0.3s; }
        .nav-btn.active { background: var(--gold); color: #000; }

        /* --- ANA GİRİŞ --- */
        #main-menu { height: 100vh; display: flex; flex-direction: column; }
        .hero-card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; position: relative; transition: 0.5s; overflow: hidden; }
        
        .expert-hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1566127444979-b3d2b654e3d7?auto=format&fit=crop&w=800&q=80'); background-size: cover; border-bottom: 2px solid var(--gold); }
        .expert-hero h1 { font-family: 'Cinzel'; font-size: 2.2rem; color: var(--gold); margin: 0; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .expert-hero p { font-family: 'Cinzel'; letter-spacing: 3px; font-size: 0.8rem; color: #aaa; margin-top: 10px; }

        .kids-hero { background: linear-gradient(135deg, #87CEEB, #E0F2F1); color: var(--athens-blue); }
        .kids-hero h1 { font-family: 'Fredoka'; font-size: 2.5rem; margin: 0; }

        /* --- YETİŞKİN MODU: REHBER ARAYÜZÜ --- */
        #expert-view { display: none; min-height: 100vh; background: #080808; background-image: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .museum-top { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--dark-gold); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .museum-top h2 { font-family: 'Cinzel'; font-size: 1.4rem; color: var(--gold); letter-spacing: 4px; margin: 0; }

        .artifact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; padding-bottom: 120px; }
        .artifact-card { background: #111; border: 1px solid #222; position: relative; transition: 0.4s; overflow: hidden; border-radius: 2px; }
        .artifact-card:active { transform: scale(0.96); border-color: var(--gold); }
        .artifact-card img { width: 100%; height: 180px; object-fit: cover; opacity: 0.7; filter: sepia(30%); transition: 0.4s; }
        .artifact-card:hover img { opacity: 1; filter: sepia(0%); }
        .artifact-card .info-bar { padding: 12px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--dark-gold); text-align: center; }
        .artifact-card span { font-family: 'Cinzel'; font-size: 0.75rem; color: var(--gold); font-weight: 700; letter-spacing: 1px; }

        /* --- YETİŞKİN MODU: 5D TARAMA --- */
        #scanner { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .scan-box { width: 300px; height: 300px; border: 1px solid var(--gold); position: relative; background: #000; overflow: hidden; box-shadow: 0 0 40px rgba(212,175,55,0.1); }
        #scan-img-target { width: 100%; height: 100%; object-fit: contain; }
        .laser-line { width: 100%; height: 2px; background: var(--gold); position: absolute; animation: laserMove 3s infinite ease-in-out; box-shadow: 0 0 15px var(--gold); }
        @keyframes laserMove { 0%, 100% { top: 0; } 50% { top: 100%; } }
        
        .result-panel { background: #0f0f0f; border-left: 3px solid var(--gold); color: #fff; padding: 25px; width: 100%; max-width: 450px; margin-top: 20px; box-sizing: border-box; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .result-panel h3 { font-family: 'Cinzel'; color: var(--gold); margin: 0 0 10px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .result-panel p { font-size: 0.85rem; line-height: 1.6; color: #ccc; margin: 0; }

        /* --- ÇOCUK MODU ARAYÜZÜ --- */
        #kids-view { display: none; min-height: 100vh; background: linear-gradient(180deg, #87CEEB 0%, #FFF9C4 100%); text-align: center; }
        .kids-header { background: var(--athens-blue); color: #fff; padding: 25px; font-family: 'Fredoka'; border-bottom: 6px solid var(--gold); border-radius: 0 0 40px 40px; }
        .quiz-box { margin: 25px; background: #fff; border: 4px solid var(--athens-blue); border-radius: 25px; padding: 30px; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .opt-btn { display: block; width: 100%; padding: 18px; margin: 10px 0; background: #fff; border: 3px solid var(--athens-blue); border-radius: 50px; font-family: 'Fredoka'; color: var(--athens-blue); font-weight: bold; cursor: pointer; }

        /* --- ANA BUTONLAR --- */
        .btn-close { margin-top: 25px; padding: 10px 40px; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; cursor: pointer; }
        .btn-nav-home { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 12px 40px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn active" id="btn-tr" onclick="setLang('tr')">TR</button>
        <button class="nav-btn" id="btn-el" onclick="setLang('el')">EL</button>
    </div>

    <div id="main-menu">
        <div class="hero-card expert-hero" onclick="openMode('expert')">
            <h1 data-key="m-expert-h">SERGİ REHBERİ</h1>
            <p data-key="m-expert-p">ANTİK ARŞİVİ KEŞFEDİN</p>
        </div>
        <div class="hero-card kids-hero" onclick="openMode('kids')">
            <h1 data-key="m-kids-h">GENÇ KAŞİF</h1>
            <p data-key="m-kids-p" style="color:var(--athens-blue)">15 Gizemli Görev 🏺</p>
        </div>
    </div>

    <div id="expert-view">
        <div class="museum-top">
            <h2 data-key="exp-title">ULUSAL ARKEOLOJİ MÜZESİ</h2>
        </div>
        <div class="artifact-grid" id="grid"></div>
    </div>

    <div id="scanner">
        <div class="scan-box">
            <img id="scan-img-target" src="">
            <div class="laser-line"></div>
        </div>
        <div class="result-panel" id="res-content"></div>
        <button onclick="closeScanner()" class="btn-close" data-key="close">KAPAT</button>
    </div>

    <div id="kids-view">
        <div class="kids-header">
            <span data-key="lvl">GÖREV</span>: <span id="lvl-txt">1</span> / 15
        </div>
        <div class="quiz-box">
            <div id="q-txt" style="font-family:'Fredoka'; font-size:1.3rem; color:var(--athens-blue); margin-bottom:15px;">...</div>
            <div id="q-opts"></div>
        </div>
        <div id="shelf-grid" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; padding:20px;"></div>
    </div>

    <button class="btn-nav-home" id="home-btn" onclick="location.reload()" data-key="home">ANA MENÜ</button>

    <script>
        const i18n = {
            tr: {
                "m-expert-h": "SERGİ REHBERİ", "m-expert-p": "ANTİK ARŞİVİ KEŞFEDİN",
                "m-kids-h": "GENÇ KAŞİF", "m-kids-p": "15 Gizemli Görev 🏺",
                "exp-title": "ULUSAL ARKEOLOJİ MÜZESİ", "close": "GERİ DÖN", "home": "ANA MENÜ",
                "lvl": "GÖREV", "scanning": "VERİ ANALİZ EDİLİYOR...", "wrong": "❌ Tekrar dene!"
            },
            el: {
                "m-expert-h": "ΟΔΗΓΟΣ ΕΚΘΕΣΗΣ", "m-expert-p": "ΑΝΑΚΑΛΥΨΤΕ ΤΟ ΑΡΧΕΙΟ",
                "m-kids-h": "ΜΙΚΡΟΣ ΕΞΕΡΕΥΝΗΤΗΣ", "m-kids-p": "15 Μυστηριώδεις Αποστολές 🏺",
                "exp-title": "ΕΘΝΙΚΟ ΑΡΧΑΙΟΛΟΓΙΚΟ ΜΟΥΣΕΙΟ", "close": "ΕΠΙΣΤΡΟΦΗ", "home": "ΑΡΧΙΚΟ ΜΕΝΟΥ",
                "lvl": "ΑΠΟΣΤΟΛΗ", "scanning": "ΑΝΑΛΥΣΗ...", "wrong": "❌ Δοκίμασε ξανά!"
            }
        };

        const artifacts = [
            { id: 1, tr: "Antikythera Mekanizması", el: "Μηχανισμός Αντικυθήρων", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg/400px-NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg", desc_tr: "M.Ö. 150-100 yıllarına tarihlenen, astronomik olayları hesaplayan dünyanın ilk analog bilgisayarıdır.", desc_el: "Ο πρώτος αναλογικός υπολογιστής του κόσμου (150 π.Χ.)." },
            { id: 2, tr: "Agamemnon Maskesi", el: "Μάσκα του Αγαμέμνονα", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Gold_Mask_of_Agamemnon.jpg/400px-Gold_Mask_of_Agamemnon.jpg", desc_tr: "Miken saray mezarlarında bulunan saf altın cenaze maskesi. Erken Yunan medeniyetinin sembolüdür.", desc_el: "Χρυσή νεκρική μάσκα από τις Μυκήνες." },
            { id: 3, tr: "Artemision Zeus'u", el: "Δίας του Αρτεμισίου", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Artemision_Bronze_NAMA_15161_n3.jpg/400px-Artemision_Bronze_NAMA_15161_n3.jpg", desc_tr: "Arkaik dönemin en muazzam bronz heykellerinden biri. Şimşek fırlatır vaziyette betimlenmiştir.", desc_el: "Μεγαλοπρεπές χάλκινο άγαλμα του Δία." },
            { id: 4, tr: "Maraton Genci", el: "Έφηβος του Μαραθώνα", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/NAMA_Ephebe_Marathon.jpg/400px-NAMA_Ephebe_Marathon.jpg", desc_tr: "Deniz altından çıkarılan, geç klasik döneme ait kusursuz bir genç erkek heykelidir.", desc_el: "Κλασικό άγαλμα εφήβου." }
        ];

        let lang = 'tr';
        let level = 0;

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+l).classList.add('active');
            Object.keys(i18n[l]).forEach(key => {
                const el = document.querySelector(`[data-key="${key}"]`);
                if(el) el.innerText = i18n[l][key];
            });
            if(document.getElementById('expert-view').style.display === 'block') loadGrid();
        }

        function openMode(m) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            document.getElementById(m + '-view').style.display = 'block';
            if(m === 'expert') loadGrid();
        }

        function loadGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = artifacts.map(a => `
                <div class="artifact-card" onclick="scanItem(${a.id})">
                    <img src="${a.img}">
                    <div class="info-bar"><span>${lang === 'tr' ? a.tr : a.el}</span></div>
                </div>
            `).join('');
        }

        function scanItem(id) {
            const a = artifacts.find(x => x.id === id);
            document.getElementById('scan-img-target').src = a.img;
            document.getElementById('scanner').style.display = 'flex';
            document.getElementById('res-content').innerHTML = `<h3>${i18n[lang].scanning}</h3>`;
            setTimeout(() => {
                document.getElementById('res-content').innerHTML = `
                    <h3>${lang === 'tr' ? a.tr : a.el}</h3>
                    <p>${lang === 'tr' ? a.desc_tr : a.desc_el}</p>
                `;
            }, 1200);
        }

        function closeScanner() { document.getElementById('scanner').style.display = 'none'; }
    </script>
</body>
</html>
