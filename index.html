<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM Athens - Dual Mode</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;900&family=Fredoka:wght@400;700&display=swap');
        
        :root { --gold: #D4AF37; --kids-blue: #4CC9F0; --kids-pink: #F72585; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Roboto', sans-serif; overflow-x: hidden; }

        /* SPLASH SCREEN (MOD SEÇİMİ) */
        #splash { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #splash h1 { color: #fff; font-family: 'Cinzel'; margin-bottom: 40px; padding: 0 20px; }
        .mode-btn { width: 280px; padding: 25px; margin: 15px; border-radius: 15px; border: none; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .adult-select { background: #fff; color: #000; font-family: 'Cinzel'; border-bottom: 5px solid var(--gold); }
        .kids-select { background: var(--kids-blue); color: #fff; font-family: 'Fredoka'; border-bottom: 5px solid #3a0ca3; }

        /* ADULT STYLE (PROJE 1) */
        .mode-adult { background: #0a0a0a; color: #fff; }
        .mode-adult header { background: #fff; color: #000; font-family: 'Cinzel'; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .mode-adult .card { background: #fff; color: #000; border-bottom: 4px solid var(--gold); border-radius: 2px; }

        /* KIDS STYLE (PROJE 2) */
        .mode-kids { background: #f0f9ff; color: #333; }
        .mode-kids header { background: var(--kids-pink); color: #fff; font-family: 'Fredoka'; padding: 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .mode-kids .card { background: #fff; color: #333; border: 4px solid var(--kids-blue); border-radius: 25px; overflow: hidden; }
        .mode-kids .card p { font-family: 'Fredoka'; color: var(--kids-pink); font-size: 1rem; }

        /* COMMON UI */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; padding-bottom: 100px; }
        .card { cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .img-box { width: 100%; height: 150px; background: #eee; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card p { padding: 10px; text-align: center; margin: 0; font-weight: bold; font-size: 0.8rem; }

        /* LANG BAR */
        .lang-bar { position: fixed; top: 10px; right: 10px; z-index: 3000; }
        .l-btn { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* SCANNER PANEL */
        #scanner { display: none; position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
        .scan-content { background: #fff; color: #000; width: 100%; max-width: 450px; border-radius: 20px; overflow: hidden; text-align: center; }
        #scan-img { width: 100%; max-height: 300px; object-fit: cover; }
        .info-p { padding: 20px; }
        .close-btn { background: #000; color: #fff; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; }
        
        .back-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; border: none; background: #000; color: #fff; font-weight: bold; cursor: pointer; z-index: 1000; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div id="splash">
        <h1>NATIONAL ARCHAEOLOGICAL MUSEUM</h1>
        <button class="mode-btn adult-select" onclick="startApp('adult')">PROJECT 1<br>Professional Archive</button>
        <button class="mode-btn kids-select" onclick="startApp('kids')">PROJECT 2<br>I'm an Archaeologist!</button>
    </div>

    <div id="app-body" style="display:none">
        <div class="lang-bar">
            <button class="l-btn" onclick="toggleLang()">EN/EL</button>
        </div>
        <header id="h-title"></header>
        <div class="grid" id="main-grid"></div>
        <button class="back-home" onclick="location.reload()">BACK TO MODES</button>
    </div>

    <div id="scanner">
        <div class="scan-content">
            <img id="scan-img" src="">
            <div class="info-p">
                <h2 id="info-name"></h2>
                <p id="info-desc"></p>
                <button class="close-btn" onclick="closeScanner()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'adult';
        let currentLang = 'en';

        const data = [
            {
                id: 1, en: "Antikythera Mechanism", el: "Μηχανισμός Αντικυθήρων",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg/500px-NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg",
                desc_en: "World's first analog computer (150 BC).",
                kids_en: "A space-robot machine from 2000 years ago! It tracked the moon and stars.",
                desc_el: "Ο πρώτος αναλογικός υπολογιστής στον κόσμο.",
                kids_el: "Μια μηχανή-ρομπότ από το παρελθόν! Παρακολουθούσε τα αστέρια."
            },
            {
                id: 2, en: "Mask of Agamemnon", el: "Μάσκα του Αγαμέμνονα",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Gold_Mask_of_Agamemnon.jpg/500px-Gold_Mask_of_Agamemnon.jpg",
                desc_en: "Gold funeral mask from Mycenae (16th century BC).",
                kids_en: "A golden mask for a powerful king! Pure gold, very heavy!",
                desc_el: "Χρυσή νεκρική μάσκα από τις Μυκήνες.",
                kids_el: "Μια χρυσή μάσκα για έναν δυνατό βασιλιά!"
            },
            {
                id: 3, en: "Artemision Zeus", el: "Δίας του Αρτεμισίου",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Artemision_Bronze_NAMA_15161_n3.jpg/500px-Artemision_Bronze_NAMA_15161_n3.jpg",
                desc_en: "Bronze statue of a god, found in a shipwreck.",
                kids_en: "Is it Zeus or Poseidon? This giant statue lived underwater for years!",
                desc_el: "Χάλκινο άγαλμα θεού, που βρέθηκε σε ναυάγιο.",
                kids_el: "Είναι ο Δίας ή ο Ποσειδώνας; Ζούσε στο βυθό της θάλασσας!"
            }
        ];

        function startApp(mode) {
            currentMode = mode;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app-body').style.display = 'block';
            document.body.className = 'mode-' + mode;
            render();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'el' : 'en';
            render();
        }

        function render() {
            const h = document.getElementById('h-title');
            if(currentMode === 'adult') {
                h.innerText = currentLang === 'en' ? "ARCHAEOLOGICAL ARCHIVE" : "ΑΡΧΑΙΟΛΟΓΙΚΟ ΑΡΧΕΙΟ";
            } else {
                h.innerText = currentLang === 'en' ? "KIDS ADVENTURE: I'M AN ARCHAEOLOGIST!" : "ΠΕΡΙΠΕΤΕΙΑ: ΓΙΝΕ ΑΡΧΑΙΟΛΟΓΟΣ!";
            }

            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map(item => `
                <div class="card" onclick="openScan(${item.id})">
                    <div class="img-box"><img src="${item.img}"></div>
                    <p>${item[currentLang]}</p>
                </div>
            `).join('');
        }

        function openScan(id) {
            const item = data.find(x => x.id === id);
            document.getElementById('scan-img').src = item.img;
            document.getElementById('info-name').innerText = item[currentLang];
            
            // Açıklama moduna göre değişir
            if(currentMode === 'kids') {
                document.getElementById('info-desc').innerText = item['kids_'+currentLang];
                document.querySelector('.scan-content').style.fontFamily = 'Fredoka';
            } else {
                document.getElementById('info-desc').innerText = item['desc_'+currentLang];
                document.querySelector('.scan-content').style.fontFamily = 'Roboto';
            }
            
            document.getElementById('scanner').style.display = 'flex';
        }

        function closeScanner() { document.getElementById('scanner').style.display = 'none'; }
    </script>
</body>
</html>
