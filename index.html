<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Archaeological Museum - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fredoka:wght@400;700&family=Poppins:wght@300;400;600;900&display=swap');
        
        :root { 
            --gold: #D4AF37;
            --dark-gold: #996515;
            --greek-blue: #005A9C;
            --marble: #F5F5F5;
            --sky-blue: #87CEEB;
            --deep-black: #0a0a0a;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .lang-bar { position: fixed; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 5px; }
        .l-btn { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); color: var(--gold); padding: 6px 12px; cursor: pointer; font-family: 'Cinzel'; border-radius: 4px; font-weight: bold; }
        .l-btn.active { background: var(--gold); color: #000; }

        .btn-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--greek-blue); color: #fff; border: 3px solid var(--gold); padding: 10px 30px; border-radius: 30px; cursor: pointer; font-family: 'Cinzel'; z-index: 2000; display: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* --- MAIN MENU --- */
        #main-menu { height: 100vh; display: flex; flex-direction: column; }
        .mode-card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; text-align: center; position: relative; overflow: hidden; }
        
        .expert-card { background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://www.transparenttextures.com/patterns/marble-reservoir.png'); color: #000; border-bottom: 5px solid var(--gold); }
        .expert-card h1 { font-family: 'Cinzel'; font-size: 2.2rem; margin: 10px; color: #1a1a1a; }
        .expert-card p { font-family: 'Cinzel'; font-weight: bold; color: var(--dark-gold); letter-spacing: 1px; }

        .kids-card { background: linear-gradient(to bottom, var(--sky-blue), #fff); color: var(--greek-blue); }
        .kids-card h1 { font-family: 'Fredoka'; font-size: 2.2rem; margin: 10px; }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.6; animation: moveCloud 15s infinite linear; }
        @keyframes moveCloud { from { left: -100px; } to { left: 110%; } }

        /* --- EXPERT VIEW (YENİLENMİŞ CANLI ARAYÜZ) --- */
        #expert-view { display: none; min-height: 100vh; background: var(--deep-black); background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .archive-header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111, #000); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .archive-header h2 { font-family: 'Cinzel'; font-size: 1.6rem; color: var(--gold); letter-spacing: 3px; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .artifact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; padding-bottom: 120px; }
        .artifact-card { background: #1a1a1a; border-radius: 2px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; border: 1px solid #333; transition: 0.3s ease; position: relative; }
        .artifact-card:active { transform: scale(0.95); }
        .artifact-card::after { content: ''; position: absolute; inset: 0; border: 1px solid transparent; transition: 0.3s; }
        .artifact-card:hover::after { border-color: var(--gold); }
        
        .artifact-card img { width: 100%; height: 180px; object-fit: cover; filter: sepia(20%) contrast(1.1); transition: 0.5s; }
        .artifact-card:hover img { filter: sepia(0%) contrast(1.2); transform: scale(1.05); }
        
        .artifact-card p { padding: 15px; font-family: 'Cinzel'; font-weight: 900; text-align: center; font-size: 0.8rem; color: var(--gold); background: rgba(0,0,0,0.8); margin: 0; border-top: 1px solid var(--dark-gold); }

        /* --- 5D SCANNER (YENİLENMİŞ CANLI ARAYÜZ) --- */
        #scanner { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .scan-frame { width: 300px; height: 300px; border: 2px solid var(--gold); position: relative; overflow: hidden; background: #000; box-shadow: 0 0 50px rgba(212,175,55,0.3); border-radius: 5px; }
        #scan-img-target { width: 100%; height: 100%; object-fit: contain; }
        .scan-line { width: 100%; height: 3px; background: var(--gold); position: absolute; animation: scanAnim 2.5s infinite ease-in-out; box-shadow: 0 0 20px var(--gold); }
        @keyframes scanAnim { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        .res-box { background: #111; color: #fff; padding: 30px; border-left: 5px solid var(--gold); width: 100%; max-width: 450px; margin-top: 20px; box-sizing: border-box; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .res-box h2 { font-family: 'Cinzel'; color: var(--gold); margin: 0 0 15px 0; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .res-box p { line-height: 1.6; font-size: 0.95rem; color: #ccc; }

        /* --- KIDS VIEW --- */
        #kids-view { display: none; min-height: 100vh; background: linear-gradient(180deg, var(--sky-blue) 0%, #FFF9C4 100%); text-align: center; }
        .kids-header { background: var(--greek-blue); color: #fff; padding: 20px; font-family: 'Fredoka'; border-bottom: 6px solid var(--gold); border-radius: 0 0 30px 30px; }
        .quiz-container { margin: 20px; background: #FFFDE7; border: 4px solid #BCAAA4; border-radius: 20px; padding: 25px; box-shadow: 0 8px 0 #D7CCC8; }
        .q-text { font-family: 'Fredoka'; font-size: 1.2rem; color: #5D4037; margin-bottom: 15px; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 3px solid var(--greek-blue); border-radius: 50px; font-family: 'Fredoka'; color: var(--greek-blue); font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 var(--greek-blue); }
        
        .shelf { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; margin: 0 20px; background: rgba(255,255,255,0.4); border-radius: 15px; border: 2px dashed var(--greek-blue); }
        .slot { aspect-ratio: 1; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.2; transition: 0.4s; }
        .slot.found { opacity: 1; background: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="l-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="l-btn" id="btn-el" onclick="setLang('el')">EL</button>
    </div>

    <div id="main-menu">
        <div class="mode-card expert-card" onclick="openMode('expert')">
            <h1 data-key="m-expert-h">EXHIBITION GUIDE</h1>
            <p data-key="m-expert-p">Scan & Discover Ancient Secrets</p>
        </div>
        <div class="mode-card kids-card" onclick="openMode('kids')">
            <div class="cloud" style="top:10%; width:80px; height:30px;"></div>
            <div class="cloud" style="top:25%; width:120px; height:40px; animation-delay:-5s;"></div>
            <h1 data-key="m-kids-h">JUNIOR EXPLORER</h1>
            <p data-key="m-kids-p">15 Missions of Ancient Greece 🏺</p>
        </div>
    </div>

    <div id="expert-view">
        <div class="archive-header">
            <h2 data-key="exp-title">NATIONAL MUSEUM ARCHIVE</h2>
        </div>
        <div class="artifact-grid" id="grid"></div>
    </div>

    <div id="scanner">
        <div class="scan-frame">
            <img id="scan-img-target" src="">
            <div class="scan-line"></div>
        </div>
        <div class="res-box" id="res-content"></div>
        <button onclick="closeScanner()" style="margin-top:25px; padding:12px 45px; background:none; border:2px solid var(--gold); color:var(--gold); font-family:'Cinzel'; font-weight:bold; cursor:pointer; letter-spacing:2px; transition:0.3s;" data-key="close">CLOSE</button>
    </div>

    <div id="kids-view">
        <div class="kids-header">
            <h2 data-key="lvl">MISSION</h2> <h2 id="lvl-txt">1</h2> / 15
        </div>
        <div class="quiz-container">
            <div class="q-text" id="q-txt">...</div>
            <div id="q-opts"></div>
        </div>
        <div style="font-family:'Cinzel'; color:var(--greek-blue); margin:10px; font-weight:bold;">MY MEDALS</div>
        <div class="shelf" id="shelf-grid"></div>
    </div>

    <button class="btn-home" id="home-btn" onclick="location.reload()" data-key="home">BACK TO MENU</button>

    <script>
        /* SCRIPT BÖLÜMÜ OLDUĞU GİBİ KORUNDU */
        const i18n = {
            en: {
                "m-expert-h": "EXHIBITION GUIDE", "m-expert-p": "Scan & Discover Ancient Secrets",
                "m-kids-h": "JUNIOR EXPLORER", "m-kids-p": "15 Missions of Ancient Greece 🏺",
                "exp-title": "NATIONAL MUSEUM ARCHIVE", "close": "BACK TO GALLERY", "home": "BACK TO MENU",
                "lvl": "MISSION", "scanning": "DECRYPTING ANCIENT DATA...", "wrong": "❌ Try again, hero!"
            },
            el: {
                "m-expert-h": "ΟΔΗΓΟΣ ΕΚΘΕΣΗΣ", "m-expert-p": "Σάρωση & Ανακάλυψη Μυστικών",
                "m-kids-h": "ΜΙΚΡΟΣ ΕΞΕΡΕΥΝΗΤΗΣ", "m-kids-p": "15 Αποστολές στην Αρχαία Ελλάδα 🏺",
                "exp-title": "ΑΡΧΕΙΟ ΕΘΝΙΚΟΥ ΜΟΥΣΕΙΟΥ", "close": "ΕΠΙΣΤΡΟΦΗ", "home": "ΑΡΧΙΚΟ ΜΕΝΟΥ",
                "lvl": "ΑΠΟΣΤΟΛΗ", "scanning": "ΑΝΑΛΥΣΗ ΔΕΔΟΜΕΝΩΝ...", "wrong": "❌ Δοκίμασε ξανά!"
            }
        };

        const artifacts = [
            { id: 1, en: "Antikythera Mechanism", el: "Μηχανισμός Αντικυθήρων", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg/400px-NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg", desc_en: "The world's first analog computer. A complex device of gears used to predict astronomical positions and eclipses for calendar and astrological purposes.", desc_el: "Ο πρώτος αναλογικός υπολογιστής του κόσμου. Μια πολύπλοκη συσκευή γραναζιών που χρησιμοποιήθηκε για την πρόβλεψη αστρονομικών θέσεων." },
            { id: 2, en: "Mask of Agamemnon", el: "Μάσκα του Αγαμέμνονα", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Gold_Mask_of_Agamemnon.jpg/400px-Gold_Mask_of_Agamemnon.jpg", desc_en: "A discovery by Heinrich Schliemann in 1876 at Mycenae. This funeral mask is crafted from a single thick sheet of gold, hammered against a wooden form.", desc_el: "Μια ανακάλυψη του Ερρίκου Σλήμαν το 1876 στις Μυκήνες. Αυτή η νεκρική μάσκα είναι κατασκευασμένη από ένα ενιαίο φύλλο χρυσού." },
            { id: 3, en: "Artemision Zeus", el: "Δίας του Αρτεμισίου", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Artemision_Bronze_NAMA_15161_n3.jpg/400px-Artemision_Bronze_NAMA_15161_n3.jpg", desc_en: "A masterpiece of the Early Classical period (c. 460 BC). Found in a shipwreck, it depicts either Zeus or Poseidon in a powerful, balanced pose.", desc_el: "Ένα αριστούργημα της Πρώιμης Κλασικής περιόδου. Βρέθηκε σε ναυάγιο και απεικονίζει είτε τον Δία είτε τον Ποσειδώνα." }
        ];

        const questions = [
            { en: "Who is the King of Gods?", el: "Ποιος είναι ο βασιλιάς των θεών;", opts_en: ["Zeus", "Ares"], opts_el: ["Δίας", "Άρης"], c: 0, s: "⚡" },
            { en: "Famous city of 300 warriors?", el: "Πόλη των 300 πολεμιστών;", opts_en: ["Athens", "Sparta"], opts_el: ["Αθήνα", "Σπάρτη"], c: 1, s: "🛡️" },
            { en: "Who wrote the Odyssey?", el: "Ποιος έγραψε την Οδύσσεια;", opts_en: ["Homer", "Plato"], opts_el: ["Όμηρος", "Πλάτων"], c: 0, s: "📜" },
            { en: "Goddess of Wisdom?", el: "Ποια είναι η θεά της σοφίας;", opts_en: ["Athena", "Hera"], opts_el: ["Αθηνά", "Ήρα"], c: 0, s: "🦉" },
            { en: "The Trojan Horse was made of?", el: "Ο Δούρειος Ίππος ήταν από;", opts_en: ["Stone", "Wood"], opts_el: ["Πέτρα", "Ξύλο"], c: 1, s: "🐎" },
            { en: "Where do the Gods live?", el: "Πού ζουν οι Θεοί;", opts_en: ["Olympus", "Atlantis"], opts_el: ["Όλυμπος", "Ατλαντίδα"], c: 0, s: "🏔️" },
            { en: "God of the Sea?", el: "Ποιος είναι ο Θεός της θάλασσας;", opts_en: ["Poseidon", "Hermes"], opts_el: ["Ποσειδώνας", "Ερμής"], c: 0, s: "🔱" },
            { en: "Monster with snake hair?", el: "Τέρας με φίδια για μαλλιά;", opts_en: ["Medusa", "Hydra"], opts_el: ["Μέδουσα", "Ύδρα"], c: 0, s: "🐍" },
            { en: "Olympic prize in ancient times?", el: "Βραβείο αρχαίων Ολυμπιακών;", opts_en: ["Olive Wreath", "Gold Medal"], opts_el: ["Κότινος", "Χρυσό Μετάλλιο"], c: 0, s: "🌿" },
            { en: "The messenger of the Gods?", el: "Ο αγγελιοφόρος των Θεών;", opts_en: ["Hermes", "Apollo"], opts_el: ["Ερμής", "Απόλλων"], c: 0, s: "👟" },
            { en: "Strongest Greek hero?", el: "Πιο δυνατός Έλληνας ήρωας;", opts_en: ["Hercules", "Achilles"], opts_el: ["Ηρακλής", "Αχιλλέας"], c: 0, s: "💪" },
            { en: "Goddess of Love?", el: "Ποια είναι η θεά του έρωτα;", opts_en: ["Aphrodite", "Artemis"], opts_el: ["Αφροδίτη", "Άρτεμις"], c: 0, s: "❤️" },
            { en: "3-headed dog of Hades?", el: "Ο σκύλος με τα 3 κεφάλια;", opts_en: ["Cerberus", "Chimera"], opts_el: ["Κέρβερος", "Χίμαιρα"], c: 0, s: "🐕" },
            { en: "Giant with one eye?", el: "Γίγαντας με ένα μάτι;", opts_en: ["Cyclops", "Titan"], opts_el: ["Κύκλωπας", "Τιτάνας"], c: 0, s: "👁️" },
            { en: "The God of Music?", el: "Ο Θεός της μουσικής;", opts_en: ["Apollo", "Dionysus"], opts_el: ["Απόλλων", "Διόνυσος"], c: 0, s: "🎵" }
        ];

        let lang = 'en';
        let level = 0;

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+l).classList.add('active');
            Object.keys(i18n[l]).forEach(key => {
                const el = document.querySelector(`[data-key="${key}"]`);
                if(el) el.innerText = i18n[l][key];
            });
            if(document.getElementById('expert-view').style.display === 'block') loadGrid();
            if(document.getElementById('kids-view').style.display === 'block') loadGame();
        }

        function openMode(m) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            document.getElementById(m + '-view').style.display = 'block';
            if(m === 'expert') loadGrid();
            if(m === 'kids') { initShelf(); loadGame(); }
        }

        function loadGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = artifacts.map(a => `
                <div class="artifact-card" onclick="scanItem(${a.id})">
                    <img src="${a.img}">
                    <p>${lang === 'en' ? a.en : a.el}</p>
                </div>
            `).join('');
        }

        function scanItem(id) {
            const a = artifacts.find(x => x.id === id);
            const scanner = document.getElementById('scanner');
            document.getElementById('scan-img-target').src = a.img;
            scanner.style.display = 'flex';
            document.getElementById('res-content').innerHTML = `<h3>${i18n[lang].scanning}</h3>`;
            setTimeout(() => {
                document.getElementById('res-content').innerHTML = `
                    <h2>${lang === 'en' ? a.en : a.el}</h2>
                    <p>${lang === 'en' ? a.desc_en : a.desc_el}</p>
                `;
            }, 1200);
        }
        function closeScanner() { document.getElementById('scanner').style.display = 'none'; }

        function initShelf() {
            const s = document.getElementById('shelf-grid');
            s.innerHTML = questions.map((q, i) => `<div class="slot" id="slot-${i}">${q.s}</div>`).join('');
        }

        function loadGame() {
            if(level >= 15) { alert("🏆 MASTER ARCHAEOLOGIST!"); location.reload(); return; }
            const q = questions[level];
            document.getElementById('lvl-txt').innerText = level + 1;
            document.getElementById('q-txt').innerText = lang === 'en' ? q.en : q.el;
            document.getElementById('q-opts').innerHTML = (lang === 'en' ? q.opts_en : q.opts_el).map((o, i) => `
                <button class="opt-btn" onclick="answer(${i})">${o}</button>
            `).join('');
        }

        function answer(i) {
            if(i === questions[level].c) {
                document.getElementById(`slot-${level}`).classList.add('found');
                level++;
                setTimeout(loadGame, 400);
            } else {
                alert(i18n[lang].wrong);
            }
        }
    </script>
</body>
</html>
