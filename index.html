<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filoktitis - Official Interactive Story</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Spectral:italic,wght@400;700&display=swap');
        
        :root { --gold: #d4af37; --bg: #05020a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Spectral', serif; height: 100vh; overflow: hidden; }

        /* LANG BAR */
        .lang-fixed { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .l-btn { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; font-family: 'Cinzel', serif; margin-left: 10px; transition: 0.3s; }
        .l-btn.active { background: var(--gold); color: #000; }

        /* THE PARCHMENT CONTAINER */
        .wrapper { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://antikythera.web-2.gr/assets/bg-dark.jpg') center/cover; }
        
        .parchment { 
            width: 90%; max-width: 950px; height: 550px; 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 20px solid transparent;
            border-image: url('https://antikythera.web-2.gr/assets/border-gold.png') 30 round;
            display: flex; position: relative; box-shadow: 0 0 50px #000;
        }

        /* CHARACTER IMAGE */
        .char-box { width: 45%; height: 100%; position: relative; overflow: hidden; border-right: 2px solid rgba(139,69,19,0.2); }
        .char-img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }

        /* TEXT CONTENT */
        .text-box { width: 55%; padding: 40px; color: #2c1e0a; display: flex; flex-direction: column; justify-content: space-between; }
        .dialogue { font-size: 22px; font-style: italic; line-height: 1.5; font-weight: 500; }
        
        /* CONTROLS (Videonun alt paneli) */
        .nav-ui { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px; }
        .arrow-btn { background: none; border: none; font-size: 45px; color: #8b4513; cursor: pointer; transition: 0.3s; }
        .arrow-btn:hover { color: var(--gold); transform: scale(1.1); }
        .arrow-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* QUIZ OVERLAY */
        #quiz-layer { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(10,4,20,0.96); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 50; text-align: center; padding: 40px;
        }
        .q-opt { width: 100%; max-width: 400px; padding: 15px; margin: 10px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-family: 'Cinzel', serif; cursor: pointer; transition: 0.3s; }
        .q-opt:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="lang-fixed">
        <button class="l-btn active" onclick="setLang('en', this)">EN</button>
        <button class="l-btn" onclick="setLang('el', this)">EL</button>
    </div>

    <div class="wrapper">
        <div class="parchment">
            <div class="char-box">
                <img id="main-char" class="char-img" src="" alt="Character">
            </div>

            <div class="text-box">
                <div id="text-output" class="dialogue"></div>
                
                <div class="nav-ui">
                    <button class="arrow-btn" id="p-btn" onclick="go(-1)">⇠</button>
                    <div id="dots" style="color: #8b4513; font-weight: bold; font-family: 'Cinzel';">I / III</div>
                    <button class="arrow-btn" id="n-btn" onclick="go(1)">⇢</button>
                </div>
            </div>

            <div id="quiz-layer">
                <h2 id="q-text" style="color: var(--gold); font-family: 'Cinzel'; margin-bottom: 30px;"></h2>
                <div id="q-options"></div>
            </div>
        </div>
    </div>

    <script>
        const db = {
            en: [
                { 
                    txt: "Greetings, young ones. I am Philoctetes. Do you wish to hear how we found the Mechanism in the dark abyss?", 
                    img: "https://antikythera.web-2.gr/assets/characters/philoctetes_main.png", // Sitedeki orijinal karakter
                    quiz: false 
                },
                { 
                    txt: "The Oracle spoke of victory, but only through the ancient bow. What was the price of our curiosity?", 
                    img: "https://antikythera.web-2.gr/assets/characters/children_listening.png", // Çocuklar
                    quiz: true,
                    q: "Which hero's weapon was needed for Troy's fall?",
                    opts: [{t: "The Bow of Heracles", c:true}, {t: "The Shield of Achilles", c:false}]
                },
                { 
                    txt: "The storm was merciless. But from that wreck, we saved the history of the stars.", 
                    img: "https://antikythera.web-2.gr/assets/backgrounds/shipwreck_scene.jpg", // Batık sahnesi
                    quiz: false 
                }
            ],
            el: [
                { 
                    txt: "Γεια σας, μικροί μου. Είμαι ο Φιλοκτήτης. Θέλετε να μάθετε πώς βρήκαμε τον Μηχανισμό στην σκοτεινή άβυσσο;", 
                    img: "https://antikythera.web-2.gr/assets/characters/philoctetes_main.png",
                    quiz: false 
                },
                { 
                    txt: "Ο Χρησμός μίλησε για νίκη, αλλά μόνο μέσα από το αρχαίο τόξο. Ποιο ήταν το τίμημα της περιέργειάς μας;", 
                    img: "https://antikythera.web-2.gr/assets/characters/children_listening.png",
                    quiz: true,
                    q: "Ποιο όπλο ήρωα χρειαζόταν για την πτώση της Τροίας;",
                    opts: [{t: "Το Τόξο του Ηρακλή", c:true}, {t: "Η Ασπίδα του Αχιλλέα", c:false}]
                },
                { 
                    txt: "Η καταιγίδα ήταν ανελέητη. Αλλά από εκείνο το ναυάγιο, σώσαμε την ιστορία των άστρων.", 
                    img: "https://antikythera.web-2.gr/assets/backgrounds/shipwreck_scene.jpg",
                    quiz: false 
                }
            ]
        };

        let curLang = 'en';
        let curIdx = 0;

        function setLang(l, b) {
            curLang = l;
            document.querySelectorAll('.l-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            sync();
        }

        function sync() {
            const step = db[curLang][curIdx];
            document.getElementById('main-char').src = step.img;
            document.getElementById('text-output').innerText = `"${step.txt}"`;
            document.getElementById('dots').innerText = `${curIdx + 1} / ${db[curLang].length}`;
            
            document.getElementById('p-btn').disabled = curIdx === 0;
            document.getElementById('n-btn').disabled = curIdx === db[curLang].length - 1;

            if(step.quiz) {
                setTimeout(() => {
                    document.getElementById('quiz-layer').style.display = 'flex';
                    document.getElementById('q-text').innerText = step.q;
                    document.getElementById('q-options').innerHTML = step.opts.map(o => 
                        `<button class="q-opt" onclick="verify(${o.c})">${o.t}</button>`
                    ).join('');
                }, 1500);
            } else {
                document.getElementById('quiz-layer').style.display = 'none';
            }
        }

        function verify(c) {
            if(c) {
                document.getElementById('quiz-layer').style.display = 'none';
                if(curIdx < db[curLang].length - 1) go(1);
            } else {
                alert(curLang === 'en' ? "The Oracle is silent. Wrong!" : "Ο Χρησμός σιωπά. Λάθος!");
            }
        }

        function go(d) {
            curIdx += d;
            sync();
        }

        sync();
    </script>
</body>
</html>
