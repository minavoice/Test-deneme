<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Archaeological Museum - Professional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;900&display=swap');
        
        :root { --gold: #D4AF37; --dark: #121212; --kids: #1E88E5; }
        body, html { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* LANGUAGE SELECTOR */
        .lang-bar { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        .l-btn { background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; cursor: pointer; font-family: 'Cinzel'; margin-left: 5px; border-radius: 4px; font-weight: bold; }
        .l-btn.active { background: var(--gold); color: #000; }

        /* HEADER */
        .header-main { background: #fff; color: #000; padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.3rem; letter-spacing: 2px; }

        /* ARTIFACT GRID */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; padding-bottom: 100px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; border-bottom: 4px solid var(--gold); position: relative; }
        .card img { width: 100%; height: 170px; object-fit: cover; display: block; border-bottom: 1px solid #ddd; }
        .card p { padding: 12px; font-weight: 900; text-align: center; color: #000; margin: 0; font-size: 0.8rem; text-transform: uppercase; }

        /* SCANNER & DESCRIPTION OVERLAY */
        #scanner { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .scan-frame { width: 240px; height: 240px; border: 2px solid var(--gold); position: relative; overflow: hidden; box-shadow: 0 0 20px var(--gold); }
        .scan-line { width: 100%; height: 3px; background: #00FF00; position: absolute; animation: scanAnim 2s infinite linear; box-shadow: 0 0 15px #00FF00; }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }
        
        .info-box { background: #fff; color: #000; padding: 25px; border-radius: 10px; width: 100%; max-width: 500px; margin-top: 20px; text-align: center; }
        .info-box h2 { font-family: 'Cinzel'; color: var(--gold); margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .info-box p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 15px; }
        .close-btn { background: #000; color: #fff; border: 1px solid var(--gold); padding: 12px 40px; border-radius: 25px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; }

        /* COLLECTION SHELF FOR KIDS */
        .shelf { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; background: rgba(255,255,255,0.05); }
        .slot { width: 55px; height: 55px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; opacity: 0.1; }
        .slot.found { opacity: 1; transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        .slot img { width: 80%; height: 80%; object-fit: contain; }

        .nav-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; border: 2px solid var(--gold); padding: 12px 35px; border-radius: 30px; cursor: pointer; font-family: 'Cinzel'; z-index: 500; font-weight: bold; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="l-btn active" id="en-btn" onclick="setLang('en')">EN</button>
        <button class="l-btn" id="el-btn" onclick="setLang('el')">EL</button>
    </div>

    <div class="header-main" id="header-text">NATIONAL ARCHAEOLOGICAL MUSEUM</div>

    <div class="grid" id="main-grid"></div>

    <div id="scanner">
        <div class="scan-frame"><div class="scan-line"></div></div>
        <div class="info-box">
            <h2 id="art-title">SCANNING...</h2>
            <p id="art-desc"></p>
            <button class="close-btn" onclick="closeScan()" id="close-txt">CLOSE</button>
        </div>
    </div>

    <div id="kids-area" style="display:none; text-align:center; padding:20px; background:#E3F2FD;">
        <h2 style="color:#1565C0; font-family:'Cinzel';">MUSEUM GAME COLLECTION</h2>
        <div class="shelf" id="shelf-grid"></div>
    </div>

    <button class="nav-home" id="home-btn" onclick="location.reload()">MAIN MENU</button>

    <script>
        const i18n = {
            en: { title: "NATIONAL MUSEUM GUIDE", close: "CLOSE", scanning: "ANALYZING...", home: "MAIN MENU" },
            el: { title: "ΕΘΝΙΚΟ ΑΡΧΑΙΟΛΟΓΙΚΟ ΜΟΥΣΕΙΟ", close: "ΚΛΕΙΣΙΜΟ", scanning: "ΑΝΑΛΥΣΗ...", home: "ΑΡΧΙΚΟ ΜΕΝΟΥ" }
        };

        const artifacts = [
            { 
                id: 1, en: "Antikythera Mechanism", el: "Μηχανισμός Αντικυθήρων", 
                img: "https://source.unsplash.com/400x400/?ancient,greek,gears",
                desc_en: "An ancient Greek hand-powered analog computer, used to predict astronomical positions and eclipses.",
                desc_el: "Ένας αρχαίος ελληνικός χειροκίνητος αναλογικός υπολογιστής για την πρόβλεψη αστρονομικών θέσεων."
            },
            { 
                id: 2, en: "Mask of Agamemnon", el: "Μάσκα του Αγαμέμνονα", 
                img: "https://source.unsplash.com/400x400/?gold,mask,ancient",
                desc_en: "A gold funeral mask discovered in Mycenae (1550 BC). It was created for a high-ranking ruler.",
                desc_el: "Μια χρυσή νεκρική μάσκα που ανακαλύφθηκε στις Μυκήνες (1550 π.Χ.) για έναν υψηλόβαθμο ηγεμόνα."
            },
            { 
                id: 3, en: "Artemision Zeus", el: "Δίας του Αρτεμισίου", 
                img: "https://source.unsplash.com/400x400/?statue,bronze,greek",
                desc_en: "A majestic bronze statue representing either Zeus or Poseidon, found in a shipwreck near Cape Artemision.",
                desc_el: "Ένα μεγαλοπρεπές χάλκινο άγαλμα που αναπαριστά είτε τον Δία είτε τον Ποσειδώνα."
            },
            { 
                id: 4, en: "Artemision Jockey", el: "Ο αναβάτης του Αρτεμισίου", 
                img: "https://source.unsplash.com/400x400/?horse,statue,ancient",
                desc_en: "A dynamic bronze sculpture of a young boy racing a large horse, illustrating Hellenistic realism.",
                desc_el: "Ένα δυναμικό χάλκινο γλυπτό ενός νεαρού αγοριού που ιππεύει ένα άλογο, δείγμα ελληνιστικού ρεαλισμού."
            },
            { 
                id: 5, en: "The Diadumenos", el: "Ο Διαδούμενος", 
                img: "https://source.unsplash.com/400x400/?marble,sculpture,ancient",
                desc_en: "A famous sculpture by Polykleitos depicting a victorious athlete tying a victory ribbon around his head.",
                desc_el: "Ένα διάσημο γλυπτό του Πολύκλειτου που απεικονίζει έναν νικητή αθλητή να δένει την ταινία της νίκης."
            },
            { 
                id: 6, en: "Sphinx of Naxos", el: "Σφίγγα των Ναξίων", 
                img: "https://source.unsplash.com/400x400/?sphinx,mythology,statue",
                desc_en: "A colossal marble sphinx that stood on a ionic column in Delphi, guarding the sanctuary of Apollo.",
                desc_el: "Μια κολοσσιαία μαρμάρινη σφίγγα που στεκόταν σε ιωνική κολώνα στους Δελφούς, φύλακας του ιερού του Απόλλωνα."
            }
        ];

        let currentLang = 'en';

        function setLang(l) {
            currentLang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(l + '-btn').classList.add('active');
            document.getElementById('header-text').innerText = i18n[l].title;
            document.getElementById('close-txt').innerText = i18n[l].close;
            document.getElementById('home-btn').innerText = i18n[l].home;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = artifacts.map(a => `
                <div class="card" onclick="scanArtifact(${a.id})">
                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/400?text=Museum+Artifact'">
                    <p>${currentLang === 'en' ? a.en : a.el}</p>
                </div>
            `).join('');
        }

        function scanArtifact(id) {
            const art = artifacts.find(x => x.id === id);
            const scanner = document.getElementById('scanner');
            scanner.style.display = 'flex';
            
            document.getElementById('art-title').innerText = i18n[currentLang].scanning;
            document.getElementById('art-desc').innerText = "";

            setTimeout(() => {
                document.getElementById('art-title').innerText = currentLang === 'en' ? art.en : art.el;
                document.getElementById('art-desc').innerText = currentLang === 'en' ? art.desc_en : art.desc_el;
            }, 1500);
        }

        function closeScan() {
            document.getElementById('scanner').style.display = 'none';
        }

        // Initialize
        setLang('en');
    </script>
</body>
</html>
