<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Archaeological Museum - Final Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fredoka:wght@400;700&family=Poppins:wght@300;400;600;900&display=swap');
        
        :root { 
            --gold: #D4AF37;
            --dark-gold: #996515;
            --greek-blue: #005A9C;
            --sky-blue: #87CEEB;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .lang-bar { position: fixed; top: 15px; right: 15px; z-index: 1000; display: flex; gap: 5px; }
        .l-btn { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); color: var(--gold); padding: 6px 12px; cursor: pointer; font-family: 'Cinzel'; border-radius: 4px; font-weight: bold; }
        .l-btn.active { background: var(--gold); color: #000; }
        .btn-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--greek-blue); color: #fff; border: 3px solid var(--gold); padding: 10px 30px; border-radius: 30px; cursor: pointer; font-family: 'Cinzel'; z-index: 2000; display: none; font-weight: bold; }

        /* --- MAIN MENU --- */
        #main-menu { height: 100vh; display: flex; flex-direction: column; }
        .mode-card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; position: relative; overflow: hidden; }
        
        /* SERGİ REHBERİ: MÜZE ARKA PLANI */
        .expert-card { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1554907984-15263bfd63bd?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center; border-bottom: 5px solid var(--gold); 
        }
        .expert-card h1 { font-family: 'Cinzel'; font-size: 2.5rem; color: #fff; text-shadow: 0 0 15px var(--gold); margin: 10px; z-index: 2; }
        .expert-card p { font-family: 'Cinzel'; color: var(--gold); letter-spacing: 2px; z-index: 2; font-weight: bold; }

        /* GENÇ KAŞİF */
        .kids-card { background: linear-gradient(to bottom, var(--sky-blue), #fff); color: var(--greek-blue); }
        .kids-card h1 { font-family: 'Fredoka'; font-size: 2.2rem; margin: 10px; }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.6; animation: moveCloud 15s infinite linear; }
        @keyframes moveCloud { from { left: -100px; } to { left: 110%; } }

        /* VIEWS */
        #expert-view, #kids-view, #scanner { display: none; min-height: 100vh; }
        #expert-view { background: #000; }
        .archive-header { padding: 40px; text-align: center; color: var(--gold); font-family: 'Cinzel'; border-bottom: 1px solid var(--dark-gold); }
        .artifact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; padding-bottom: 100px; }
        .artifact-card { background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; text-align: center; }
        .artifact-card img { width: 100%; height: 150px; object-fit: cover; }
        .artifact-card p { padding: 10px; color: var(--gold); font-family: 'Cinzel'; font-size: 0.8rem; }

        /* SCANNER */
        #scanner { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .scan-frame { width: 280px; height: 280px; border: 2px solid var(--gold); position: relative; }
        #scan-img-target { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { width: 100%; height: 3px; background: var(--gold); position: absolute; animation: scanAnim 2s infinite ease-in-out; }
        @keyframes scanAnim { 0%, 100% { top: 0; } 50% { top: 100%; } }
        .res-box { margin-top: 20px; padding: 20px; background: #1a1a1a; border-left: 4px solid var(--gold); max-width: 400px; }

        /* QUIZ */
        #kids-view { background: #e3f2fd; color: #333; text-align: center; }
        .kids-header { background: var(--greek-blue); color: #fff; padding: 20px; font-family: 'Fredoka'; }
        .quiz-container { margin: 20px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-text { font-family: 'Fredoka'; font-size: 1.3rem; margin-bottom: 20px; color: var(--greek-blue); }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 2px solid var(--greek-blue); border-radius: 50px; font-family: 'Fredoka'; font-weight: bold; cursor: pointer; color: var(--greek-blue); }
        .shelf { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .slot { aspect-ratio: 1; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.3; }
        .slot.found { opacity: 1; background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="l-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="l-btn" id="btn-el" onclick="setLang('el')">EL</button>
    </div>

    <div id="main-menu">
        <div class="mode-card expert-card" onclick="openMode('expert')">
            <h1 data-key="m-expert-h">EXHIBITION GUIDE</h1>
            <p data-key="m-expert-p">Scan & Discover Ancient Secrets</p>
        </div>
        <div class="mode-card kids-card" onclick="openMode('kids')">
            <div class="cloud" style="top:10%; width:80px; height:30px;"></div>
            <h1 data-key="m-kids-h">JUNIOR EXPLORER</h1>
            <p data-key="m-kids-p">15 Missions of Ancient Greece 🏺</p>
        </div>
    </div>

    <div id="expert-view">
        <div class="archive-header"><h2 data-key="exp-title">MUSEUM ARCHIVE</h2></div>
        <div class="artifact-grid" id="grid"></div>
    </div>

    <div id="scanner">
        <div class="scan-frame"><img id="scan-img-target" src=""><div class="scan-line"></div></div>
        <div class="res-box" id="res-content"></div>
        <button onclick="closeScanner()" style="margin-top:20px; color:var(--gold); background:none; border:1px solid var(--gold); padding:10px 30px; cursor:pointer;" data-key="close">CLOSE</button>
    </div>

    <div id="kids-view">
        <div class="kids-header"><h2 data-key="lvl">MISSION</h2> <span id="lvl-txt">1</span> / 15</div>
        <div class="quiz-container">
            <div class="q-text" id="q-txt">Loading...</div>
            <div id="q-opts"></div>
        </div>
        <div class="shelf" id="shelf-grid"></div>
    </div>

    <button class="btn-home" id="home-btn" onclick="location.reload()" data-key="home">BACK TO MENU</button>

    <script>
        const i18n = {
            en: { "m-expert-h": "EXHIBITION GUIDE", "m-expert-p": "Scan & Discover Ancient Secrets", "m-kids-h": "JUNIOR EXPLORER", "m-kids-p": "15 Missions of Ancient Greece 🏺", "exp-title": "MUSEUM ARCHIVE", "close": "BACK", "home": "MENU", "lvl": "MISSION", "wrong": "❌ Wrong! Try again." },
            el: { "m-expert-h": "ΟΔΗΓΟΣ ΕΚΘΕΣΗΣ", "m-expert-p": "Σάρωση & Ανακάλυψη", "m-kids-h": "ΜΙΚΡΟΣ ΕΞΕΡΕΥΝΗΤΗΣ", "m-kids-p": "15 Αποστολές 🏺", "exp-title": "ΑΡΧΕΙΟ ΜΟΥΣΕΙΟΥ", "close": "ΠΙΣΩ", "home": "ΜΕΝΟΥ", "lvl": "ΑΠΟΣΤΟΛΗ", "wrong": "❌ Λάθος! Προσπάθησε ξανά." }
        };

        const artifacts = [
            { id: 1, en: "Antikythera Mechanism", el: "Μηχανισμός Αντικυθήρων", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg/400px-NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg", desc_en: "World's first analog computer.", desc_el: "Ο πρώτος αναλογικός υπολογιστής." },
            { id: 2, en: "Mask of Agamemnon", el: "Μάσκα του Αγαμέμνονα", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Gold_Mask_of_Agamemnon.jpg/400px-Gold_Mask_of_Agamemnon.jpg", desc_en: "Golden funeral mask.", desc_el: "Χρυσή νεκρική μάσκα." }
        ];

        const questions = [
            { en: "Who is the King of Gods?", el: "Ποιος είναι ο βασιλιάς των θεών;", opts_en: ["Zeus", "Ares"], opts_el: ["Δίας", "Άρης"], c: 0, s: "⚡" },
            { en: "City of 300 warriors?", el: "Πόλη των 300 πολεμιστών;", opts_en: ["Athens", "Sparta"], opts_el: ["Αθήνα", "Σπάρτη"], c: 1, s: "🛡️" },
            { en: "Who wrote the Odyssey?", el: "Ποιος έγραψε την Οδύσσεια;", opts_en: ["Homer", "Plato"], opts_el: ["Όμηρος", "Πλάτων"], c: 0, s: "📜" },
            { en: "Goddess of Wisdom?", el: "Ποια είναι η θεά της σοφίας;", opts_en: ["Athena", "Hera"], opts_el: ["Αθηνά", "Ήρα"], c: 0, s: "🦉" },
            { en: "Trojan Horse was made of?", el: "Ο Δούρειος Ίππος ήταν από;", opts_en: ["Stone", "Wood"], opts_el: ["Πέτρα", "Ξύλο"], c: 1, s: "🐎" },
            { en: "Where do the Gods live?", el: "Πού ζουν οι Θεοí;", opts_en: ["Olympus", "Atlantis"], opts_el: ["Όλυμπος", "Ατλαντίδα"], c: 0, s: "🏔️" },
            { en: "God of the Sea?", el: "Ποιος είναι ο Θεός της θάλασσας;", opts_en: ["Poseidon", "Hermes"], opts_el: ["Ποσειδώνας", "Ερμής"], c: 0, s: "🔱" },
            { en: "Monster with snake hair?", el: "Τέρας με φίδia για μαλλιά;", opts_en: ["Medusa", "Hydra"], opts_el: ["Μέδουσα", "Ύδρα"], c: 0, s: "🐍" },
            { en: "Olympic prize in ancient times?", el: "Βραβείο αρχαίων Ολυμπιακών;", opts_en: ["Olive Wreath", "Gold Medal"], opts_el: ["Κότινος", "Χρυσό Μετάλλιο"], c: 0, s: "🌿" },
            { en: "The messenger of the Gods?", el: "Ο αγγελιοφόρος των Θεών;", opts_en: ["Hermes", "Apollo"], opts_el: ["Ερμής", "Απόλλων"], c: 0, s: "👟" },
            { en: "Strongest Greek hero?", el: "Πιο δυνατός Έλληνας ήρωας;", opts_en: ["Hercules", "Achilles"], opts_el: ["Ηρακλής", "Αχιλλέας"], c: 0, s: "💪" },
            { en: "Goddess of Love?", el: "Ποια είναι η θεά του έρωτα;", opts_en: ["Aphrodite", "Artemis"], opts_el: ["Αφροδίτη", "Άρτεμις"], c: 0, s: "❤️" },
            { en: "3-headed dog of Hades?", el: "Ο σκύλος με τα 3 κεφάλια;", opts_en: ["Cerberus", "Chimera"], opts_el: ["Κέρβερος", "Χίμαιρα"], c: 0, s: "🐕" },
            { en: "Giant with one eye?", el: "Γίγαντας με ένα μάτι;", opts_en: ["Cyclops", "Titan"], opts_el: ["Κύκλωπας", "Τιτάνας"], c: 0, s: "👁️" },
            { en: "The God of Music?", el: "Ο Θεός της μουσικής;", opts_en: ["Apollo", "Dionysus"], opts_el: ["Απόλλων", "Διόνυσος"], c: 0, s: "🎵" }
        ];

        let lang = 'en', level = 0;

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+l).classList.add('active');
            Object.keys(i18n[l]).forEach(k => { const e = document.querySelector(`[data-key="${k}"]`); if(e) e.innerText = i18n[l][k]; });
            if(document.getElementById('expert-view').style.display === 'block') loadGrid();
            if(document.getElementById('kids-view').style.display === 'block') loadGame();
        }

        function openMode(m) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            document.getElementById(m + '-view').style.display = 'block';
            if(m === 'expert') loadGrid();
            if(m === 'kids') { initShelf(); loadGame(); }
        }

        function loadGrid() {
            document.getElementById('grid').innerHTML = artifacts.map(a => `<div class="artifact-card" onclick="scanItem(${a.id})"><img src="${a.img}"><p>${lang === 'en' ? a.en : a.el}</p></div>`).join('');
        }

        function scanItem(id) {
            const a = artifacts.find(x => x.id === id);
            document.getElementById('scan-img-target').src = a.img;
            document.getElementById('scanner').style.display = 'flex';
            document.getElementById('res-content').innerHTML = `<h2>${lang === 'en' ? a.en : a.el}</h2><p>${lang === 'en' ? a.desc_en : a.desc_el}</p>`;
        }

        function closeScanner() { document.getElementById('scanner').style.display = 'none'; }

        function initShelf() {
            document.getElementById('shelf-grid').innerHTML = questions.map((q, i) => `<div class="slot" id="slot-${i}">${q.s}</div>`).join('');
        }

        function loadGame() {
            if(level >= 15) { alert("🏆 MASTER!"); location.reload(); return; }
            const q = questions[level];
            document.getElementById('lvl-txt').innerText = level + 1;
            document.getElementById('q-txt').innerText = lang === 'en' ? q.en : q.el;
            document.getElementById('q-opts').innerHTML = (lang === 'en' ? q.opts_en : q.opts_el).map((o, i) => `<button class="opt-btn" onclick="answer(${i})">${o}</button>`).join('');
        }

        function answer(i) {
            if(i === questions[level].c) {
                document.getElementById(`slot-${level}`).classList.add('found');
                level++; setTimeout(loadGame, 500);
            } else { alert(i18n[lang].wrong); }
        }
    </script>
</body>
</html>
