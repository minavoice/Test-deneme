<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müze Rehberi Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;900&display=swap');
        :root { --gold: #D4AF37; --bg: #0a0a0a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; }

        header { background: #fff; color: #000; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; padding-bottom: 100px; }
        .card { background: #fff; border-radius: 10px; overflow: hidden; border-bottom: 4px solid var(--gold); cursor: pointer; }
        
        .img-container { width: 100%; height: 160px; background: #222; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card p { padding: 10px; margin: 0; color: #000; font-weight: 900; text-align: center; font-size: 0.75rem; text-transform: uppercase; }

        /* TARAMA EKRANI */
        #scanner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 30px; }
        .scan-box { width: 85%; max-width: 400px; border: 2px solid var(--gold); position: relative; margin-bottom: 20px; }
        #scan-img { width: 100%; display: block; }
        .scan-line { width: 100%; height: 4px; background: #00FF00; position: absolute; top: 0; animation: scanLine 2s infinite linear; box-shadow: 0 0 15px #00FF00; }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        .info-card { background: #fff; color: #000; width: 85%; max-width: 400px; padding: 20px; border-radius: 10px; text-align: center; box-sizing: border-box; }
        .info-card h2 { font-family: 'Cinzel'; color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        .close-btn { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-family: 'Cinzel'; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <header>ULUSAL ARKEOLOJİ MÜZESİ</header>

    <div class="grid" id="main-grid"></div>

    <div id="scanner">
        <div class="scan-box">
            <img id="scan-img" src="">
            <div class="scan-line"></div>
        </div>
        <div class="info-card">
            <h2 id="info-title">YÜKLENİYOR...</h2>
            <p id="info-desc"></p>
            <button class="close-btn" onclick="closeScan()">KAPAT</button>
        </div>
    </div>

    <script>
        const artifacts = [
            { 
                id: 1, name: "Antikythera Mekanizması", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/6/66/NAMA_Machine_d%27Anticyth%C3%A8re_1.jpg",
                img2: "https://www.worldhistory.org/uploads/images/1501.jpg",
                desc: "Dünyanın bilinen en eski analog bilgisayarıdır (M.Ö. 150). Gök cisimlerinin konumunu tahmin etmek için kullanılıyordu."
            },
            { 
                id: 2, name: "Agamemnon'un Maskesi", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Gold_Mask_of_Agamemnon.jpg",
                img2: "https://images.metmuseum.org/CRDImages/gr/original/DP20387.jpg",
                desc: "Miken döneminden kalma som altından yapılmış bir cenaze maskesidir. M.Ö. 16. yüzyıla tarihlenir."
            },
            { 
                id: 3, name: "Artemision Zeus'u", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/c/c8/Artemision_Bronze_NAMA_15161_n3.jpg",
                img2: "https://greekreporter.com/wp-content/uploads/2021/08/Zeus-Artemision-Statue.jpg",
                desc: "Denizden çıkarılan bu devasa bronz heykel, ya Zeus'u ya da Poseidon'u temsil etmektedir."
            },
            { 
                id: 4, name: "Artemision Jokeyi", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/d/d4/NAMA_Jockey_Artemision.jpg",
                img2: "https://pallas.ceh.kit.edu/api/images/1155/original/",
                desc: "Hellenistik döneme ait, bir yarış atı ve üzerindeki çocuk jokeyi betimleyen dinamik bir bronz heykeldir."
            },
            { 
                id: 5, name: "Mermer Kouros", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/3/3b/NAMA_Kouros_Aristodikos.jpg",
                img2: "https://joyofmuseums.com/wp-content/uploads/Kouros-of-Anavyssos-National-Archaeological-Museum-Athens.jpg",
                desc: "Arkaik dönem Yunan sanatının tipik bir örneği olan genç erkek heykelidir."
            },
            { 
                id: 6, name: "Naxos Sfenksi", 
                img1: "https://upload.wikimedia.org/wikipedia/commons/8/82/NAMA_Sphinx_Naxiens.jpg",
                img2: "https://i.pinimg.com/originals/81/73/45/81734567980345.jpg",
                desc: "M.Ö. 560 yılında Apollon tapınağını korumak için inşa edilmiş devasa mermer yaratık heykelidir."
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = artifacts.map(a => `
                <div class="card" onclick="openScan(${a.id})">
                    <div class="img-container">
                        <img src="${a.img1}" onerror="this.src='${a.img2}'">
                    </div>
                    <p>${a.name}</p>
                </div>
            `).join('');
        }

        function openScan(id) {
            const art = artifacts.find(x => x.id === id);
            const scanner = document.getElementById('scanner');
            const scanImg = document.getElementById('scan-img');
            
            // Tarama ekranındaki resmi güncelle
            scanImg.src = art.img1;
            scanImg.onerror = function() { this.src = art.img2; };
            
            scanner.style.display = 'flex';
            document.getElementById('info-title').innerText = art.name;
            document.getElementById('info-desc').innerText = art.desc;
        }

        function closeScan() { document.getElementById('scanner').style.display = 'none'; }

        renderGrid();
    </script>
</body>
</html>
